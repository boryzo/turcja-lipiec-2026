<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fca311">
  <meta name="description" content="Plan podróży Turcja - Stambuł 2026">
  <title>Turcja 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css?v=20260704-9">
</head>
<body>
  <a class="skip-link" href="#main">Przejdź do treści</a>
  <header class="site-header">
    <a class="brand" href="#start" aria-label="Turcja 2026 — start">
      <span class="brand-mark">🇹🇷</span>
      <span><strong>Turcja - Stambuł</strong><small>2 pary · lipiec 2026</small></span>
    </a>
    <button class="menu-button" type="button" aria-expanded="false" aria-controls="main-nav">Menu</button>
    <nav id="main-nav" class="main-nav" aria-label="Główna nawigacja">
      <button class="nav-link active" data-view="overview">Plan</button>
      <button class="nav-link" data-view="istanbul">Stambuł</button>
      <button class="nav-link" data-view="budget">Budżet</button>
      <button class="nav-link" data-view="practical">Praktyczne</button>
      <button class="nav-link" data-view="hiddengems">Nieoczywiste</button>
      <button class="nav-link" data-view="todo">Do ogarnięcia</button>
    </nav>
  </header>

  <main id="main">

    <div class="shell app-shell">
      <section class="view active" id="view-overview" data-view-panel="overview"></section>
      <section class="view" id="view-istanbul" data-view-panel="istanbul"></section>
      <section class="view" id="view-budget" data-view-panel="budget"></section>
      <section class="view" id="view-practical" data-view-panel="practical"></section>
      <section class="view" id="view-hiddengems" data-view-panel="hiddengems"></section>
      <section class="view" id="view-todo" data-view-panel="todo"></section>
    </div>
  </main>

  <footer class="site-footer shell">
    <div><strong>Turcja - Stambuł 2026</strong><p>Żywy plan podróży — aktualizujemy go razem.</p></div>
    <p class="footer-note">Kursy walut: NBP · Mapy: OpenStreetMap</p>
  </footer>

  <dialog id="day-modal" class="modal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Zamknij" id="modal-close-btn">✕</button>
      <div class="modal-header">
        <img id="modal-image" src="" alt="Zdjęcie poglądowe" loading="lazy">
        <div class="modal-title-box">
          <span class="section-label" id="modal-date"></span>
          <h3 id="modal-title"></h3>
        </div>
      </div>
      <div class="modal-body">
        <p id="modal-desc"></p>
        <div class="modal-details">
          <h4>🚇 Transport</h4>
          <p id="modal-transport-text"></p>
        </div>
      </div>
    </div>
  </dialog>

  <dialog id="history-modal" class="modal history-modal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Zamknij" id="history-close-btn">✕</button>
      <div class="modal-body" style="padding-top: 32px">
        <span class="section-label" style="color: var(--accent); margin-bottom: 8px; display: block">Ciekawostki i Tło</span>
        <h3 id="history-title" style="margin-bottom: 16px; font-size: 24px;"></h3>
        <div id="history-content" style="line-height: 1.6; color: var(--text-muted);"></div>
      </div>
    </div>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js?v=20260706-5"></script>
  <script src="app.js?v=20260706-5"></script>
</body>
</html>
